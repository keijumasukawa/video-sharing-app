name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v6

      - name: pnpm のセットアップ
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Node.js のセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: 依存関係のインストール
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: テスト
        run: pnpm test

      - name: ビルド
        run: pnpm build
